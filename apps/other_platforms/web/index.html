<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter BLoC App">
  <meta name="theme-color" content="#6750A4">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_bloc_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_bloc_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background-color: #FFFBFE;
    }
    #flutter-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #FFFBFE;
      color: #1D1B20;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #flutter-loading .brand {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #6750A4;
    }
    #flutter-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E6E0E9;
      border-top-color: #6750A4;
      border-radius: 50%;
      animation: flutter-spin 0.8s linear infinite;
    }
    #flutter-loading-status {
      margin: 0;
      font-size: 0.95rem;
      color: rgba(29, 27, 32, 0.72);
    }
    @keyframes flutter-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="flutter-loading" aria-live="polite" aria-busy="true">
    <div class="brand">Flutter BLoC App</div>
    <div class="spinner" role="presentation"></div>
    <p id="flutter-loading-status">Loading app…</p>
  </div>
  <script src="passkeys_bundle.js" defer></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
