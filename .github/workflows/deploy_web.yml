name: Deploy web (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_href:
        description: "Flutter --base-href (use '/<repo>/' for project sites, '/' for root/custom domain)"
        required: false
        default: ""
      recovery:
        description: "Internal: set by redispatch step (do not set manually)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Do not cancel in-flight deploy workflows: cancelling after deploy-pages submits
# leaves orphaned GitHub Pages deployments stuck in deployment_queued, which then
# blocks later runs until the 10-minute deploy-pages poll timeout.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.7'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Preflight GitHub Pages configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          response_path="${RUNNER_TEMP}/pages-preflight.json"
          status_code="$(
            curl -sS \
              -o "${response_path}" \
              -w '%{http_code}' \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "${api_url}"
          )"

          case "${status_code}" in
            200)
              python3 -c 'import json, sys; from pathlib import Path; payload = json.loads(Path(sys.argv[1]).read_text()); html_url = payload.get("html_url") or "(not yet published)"; build_type = payload.get("build_type") or "(unset)"; print(f"GitHub Pages preflight OK: {html_url} [{build_type}]")' "${response_path}"
              ;;
            404)
              {
                echo "GitHub Pages is not enabled for this repository."
                echo "Enable it in Settings -> Pages -> Build and deployment -> Source -> GitHub Actions."
                echo "This workflow intentionally fails early here because \`actions/configure-pages\` auto-enable requires a non-\`GITHUB_TOKEN\` credential."
              } >&2
              {
                echo "## GitHub Pages preflight"
                echo ""
                echo "- status: \`not enabled\`"
                echo "- action: enable **Settings -> Pages -> Build and deployment -> Source -> GitHub Actions**"
                echo "- note: workflow auto-enable is intentionally not used because \`actions/configure-pages\` requires a non-\`GITHUB_TOKEN\` credential for \`enablement: true\`"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
            *)
              echo "Unexpected GitHub Pages API response: HTTP ${status_code}" >&2
              cat "${response_path}" >&2 || true
              exit 1
              ;;
          esac

      - name: Pub get
        run: bash tool/workspace_pub_get.sh

      - name: Build web (Pages)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          INPUT_BASE_HREF: ${{ github.event.inputs.base_href || '' }}
          REPO_VARS_JSON: ${{ toJson(vars) }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_HREF="${INPUT_BASE_HREF}"
          if [[ -z "${BASE_HREF}" ]]; then
            BASE_HREF="$(python3 -c 'import json, os; raw = os.environ.get("REPO_VARS_JSON", "{}"); data = json.loads(raw) if raw else {}; value = data.get("BASE_HREF", ""); print(value if isinstance(value, str) else "")')"
          fi
          export BASE_HREF
          bash tool/build_web_github_pages.sh


      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/mobile/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      deployments: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - name: Skip deploy when commit is no longer branch tip
        id: branch_tip
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          remote_sha="$(
            curl -sS \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["sha"])'
          )"
          if [[ "${remote_sha}" != "${GITHUB_SHA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit ${GITHUB_SHA} is no longer tip of ${GITHUB_REF_NAME}; skipping deploy."
          fi

      - name: Skip deploy when Pages already published for commit
        id: pages_already_live
        if: steps.branch_tip.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if python3 tool/drain_stale_github_pages_deployments.py \
            --check-published-for-sha "${GITHUB_SHA}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Drain stale GitHub Pages deployments
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tool/drain_stale_github_pages_deployments.py \
            --max-deployments 50 \
            --settle-seconds 45

      - id: deployment
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Drain stale GitHub Pages deployments (retry)
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true' &&
          steps.deployment.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tool/drain_stale_github_pages_deployments.py \
            --max-deployments 50 \
            --poll-timeout-seconds 180 \
            --post-terminal-wait-seconds 90 \
            --exclude-sha="" \
            --ensure-current-sha-terminal

      - name: Re-dispatch Deploy web workflow after Pages failure
        id: redispatch
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true' &&
          github.event_name == 'push' &&
          steps.deployment.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const workflowFile = 'deploy_web.yml';
            const ref = context.ref.replace('refs/heads/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
              ref,
              inputs: {
                recovery: 'true',
              },
            });
            core.info(
              `Dispatched ${workflowFile} on ${ref} after Pages deploy failure.`,
            );

      - name: Re-check deploy guards before failing
        id: final_skip
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true' &&
          steps.deployment.outcome == 'failure' &&
          startsWith(github.ref, 'refs/heads/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          remote_sha="$(
            curl -sS \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["sha"])'
          )"
          if [[ "${remote_sha}" != "${GITHUB_SHA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit ${GITHUB_SHA} is no longer tip of ${GITHUB_REF_NAME}; not failing deploy."
            exit 0
          fi
          if python3 tool/drain_stale_github_pages_deployments.py \
            --check-published-for-sha "${GITHUB_SHA}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Pages deployment for ${GITHUB_SHA} is now live; not failing deploy."
          fi

      - name: Fail when Pages deploy did not succeed
        if: >-
          steps.branch_tip.outputs.skip != 'true' &&
          steps.pages_already_live.outputs.skip != 'true' &&
          steps.deployment.outcome == 'failure' &&
          steps.final_skip.outputs.skip != 'true' &&
          (
            (github.event_name == 'push' && steps.redispatch.outcome != 'success') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.recovery != 'true')
          )
        run: |
          echo "GitHub Pages deploy failed." >&2
          exit 1
