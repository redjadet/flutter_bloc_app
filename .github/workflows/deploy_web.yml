name: Deploy web (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "tool/build_web_github_pages.sh"
      - ".github/workflows/deploy_web.yml"
  workflow_dispatch:
    inputs:
      base_href:
        description: "Flutter --base-href (use '/<repo>/' for project sites, '/' for root/custom domain)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build web (Pages)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_HREF: ${{ inputs.base_href }}
        run: bash tool/build_web_github_pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
