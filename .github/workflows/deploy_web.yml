name: Deploy web (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_href:
        description: "Flutter --base-href (use '/<repo>/' for project sites, '/' for root/custom domain)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build web (Pages)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_HREF: ${{ github.event.inputs.base_href || vars.BASE_HREF }}
        run: bash tool/build_web_github_pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
