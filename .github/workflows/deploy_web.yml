name: Deploy web (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_href:
        description: "Flutter --base-href (use '/<repo>/' for project sites, '/' for root/custom domain)"
        required: false
        default: ""

# Do not cancel in-flight deploy workflows: cancelling after deploy-pages submits
# leaves orphaned GitHub Pages deployments stuck in deployment_queued, which then
# blocks later runs until the 10-minute deploy-pages poll timeout.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Preflight GitHub Pages configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          response_path="${RUNNER_TEMP}/pages-preflight.json"
          status_code="$(
            curl -sS \
              -o "${response_path}" \
              -w '%{http_code}' \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "${api_url}"
          )"

          case "${status_code}" in
            200)
              python3 -c 'import json, sys; from pathlib import Path; payload = json.loads(Path(sys.argv[1]).read_text()); html_url = payload.get("html_url") or "(not yet published)"; build_type = payload.get("build_type") or "(unset)"; print(f"GitHub Pages preflight OK: {html_url} [{build_type}]")' "${response_path}"
              ;;
            404)
              {
                echo "GitHub Pages is not enabled for this repository."
                echo "Enable it in Settings -> Pages -> Build and deployment -> Source -> GitHub Actions."
                echo "This workflow intentionally fails early here because \`actions/configure-pages\` auto-enable requires a non-\`GITHUB_TOKEN\` credential."
              } >&2
              {
                echo "## GitHub Pages preflight"
                echo ""
                echo "- status: \`not enabled\`"
                echo "- action: enable **Settings -> Pages -> Build and deployment -> Source -> GitHub Actions**"
                echo "- note: workflow auto-enable is intentionally not used because \`actions/configure-pages\` requires a non-\`GITHUB_TOKEN\` credential for \`enablement: true\`"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
            *)
              echo "Unexpected GitHub Pages API response: HTTP ${status_code}" >&2
              cat "${response_path}" >&2 || true
              exit 1
              ;;
          esac

      - name: Pub get
        run: flutter pub get

      - name: Build web (Pages)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          INPUT_BASE_HREF: ${{ github.event.inputs.base_href || '' }}
          REPO_VARS_JSON: ${{ toJson(vars) }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_HREF="${INPUT_BASE_HREF}"
          if [[ -z "${BASE_HREF}" ]]; then
            BASE_HREF="$(python3 -c 'import json, os; raw = os.environ.get("REPO_VARS_JSON", "{}"); data = json.loads(raw) if raw else {}; value = data.get("BASE_HREF", ""); print(value if isinstance(value, str) else "")')"
          fi
          export BASE_HREF
          bash tool/build_web_github_pages.sh


      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6

      - name: Cancel stale queued GitHub Pages deployments
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api_version="2026-03-10"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"

          deployments_json="${RUNNER_TEMP}/pages-deployments.json"
          curl -sS \
            -H "${accept_header}" \
            -H "${auth_header}" \
            -H "X-GitHub-Api-Version: ${api_version}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=10" \
            > "${deployments_json}"

          python3 - "${deployments_json}" "${GITHUB_REPOSITORY}" "${api_version}" <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from pathlib import Path

          deployments_path, repository, api_version = sys.argv[1:4]
          token = os.environ["GITHUB_TOKEN"]
          deployments = json.loads(Path(deployments_path).read_text())
          current_sha = os.environ.get("GITHUB_SHA", "")
          active_statuses = {
              "deployment_queued",
              "deployment_in_progress",
              "syncing_files",
              "finished_file_sync",
              "updating_pages",
              "purging_cdn",
          }

          def pages_status(sha: str) -> str:
              proc = subprocess.run(
                  [
                      "curl",
                      "-sS",
                      "-H",
                      "Accept: application/vnd.github+json",
                      "-H",
                      f"Authorization: Bearer {token}",
                      "-H",
                      f"X-GitHub-Api-Version: {api_version}",
                      f"https://api.github.com/repos/{repository}/pages/deployments/{sha}",
                  ],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if proc.returncode != 0:
                  return ""
              return json.loads(proc.stdout or "{}").get("status", "")

          def cancel_pages_deployment(sha: str) -> None:
              subprocess.run(
                  [
                      "curl",
                      "-sS",
                      "-o",
                      "/dev/null",
                      "-w",
                      "%{http_code}",
                      "-X",
                      "POST",
                      "-H",
                      "Accept: application/vnd.github+json",
                      "-H",
                      f"Authorization: Bearer {token}",
                      "-H",
                      f"X-GitHub-Api-Version: {api_version}",
                      f"https://api.github.com/repos/{repository}/pages/deployments/{sha}/cancel",
                  ],
                  check=False,
              )

          def recent_shas() -> list[str]:
              shas: list[str] = []
              for deployment in deployments:
                  sha = deployment.get("sha")
                  if sha and sha != current_sha and sha not in shas:
                      shas.append(sha)
              return shas

          def should_cancel(status: str) -> bool:
              return status in active_statuses or status == ""

          for sha in recent_shas():
              status = pages_status(sha)
              if not should_cancel(status):
                  continue
              print(f"Cancelling stale Pages deployment for {sha[:7]} (status={status!r})")
              cancel_pages_deployment(sha)

          deadline = time.time() + 120
          while time.time() < deadline:
              blocking = []
              for sha in recent_shas():
                  status = pages_status(sha)
                  if status in active_statuses:
                      blocking.append((sha, status))
              if not blocking:
                  break
              for sha, status in blocking:
                  print(f"Waiting for Pages deployment {sha[:7]} to clear (status={status!r})")
                  cancel_pages_deployment(sha)
              time.sleep(5)
          else:
              pending = [
                  f"{sha[:7]}={status!r}"
                  for sha in recent_shas()
                  if (status := pages_status(sha)) in active_statuses
              ]
              if pending:
                  print(
                      "Timed out waiting for stale Pages deployments to clear: "
                      + ", ".join(pending)
                  )
          PY

      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Clear blocking Pages deployment and retry
        if: steps.deployment.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api_version="2026-03-10"

          python3 - "${GITHUB_REPOSITORY}" "${api_version}" <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          repository, api_version = sys.argv[1:3]
          token = os.environ["GITHUB_TOKEN"]
          active_statuses = {
              "deployment_queued",
              "deployment_in_progress",
              "syncing_files",
              "finished_file_sync",
              "updating_pages",
              "purging_cdn",
          }

          def pages_status(sha: str) -> str:
              proc = subprocess.run(
                  [
                      "curl",
                      "-sS",
                      "-H",
                      "Accept: application/vnd.github+json",
                      "-H",
                      f"Authorization: Bearer {token}",
                      "-H",
                      f"X-GitHub-Api-Version: {api_version}",
                      f"https://api.github.com/repos/{repository}/pages/deployments/{sha}",
                  ],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if proc.returncode != 0:
                  return ""
              return json.loads(proc.stdout or "{}").get("status", "")

          def cancel_pages_deployment(sha: str) -> None:
              subprocess.run(
                  [
                      "curl",
                      "-sS",
                      "-o",
                      "/dev/null",
                      "-X",
                      "POST",
                      "-H",
                      "Accept: application/vnd.github+json",
                      "-H",
                      f"Authorization: Bearer {token}",
                      "-H",
                      f"X-GitHub-Api-Version: {api_version}",
                      f"https://api.github.com/repos/{repository}/pages/deployments/{sha}/cancel",
                  ],
                  check=False,
              )

          current_sha = os.environ.get("GITHUB_SHA", "")
          deployments_json = subprocess.run(
              [
                  "curl",
                  "-sS",
                  "-H",
                  "Accept: application/vnd.github+json",
                  "-H",
                  f"Authorization: Bearer {token}",
                  "-H",
                  f"X-GitHub-Api-Version: {api_version}",
                  f"https://api.github.com/repos/{repository}/deployments?environment=github-pages&per_page=10",
              ],
              capture_output=True,
              text=True,
              check=True,
          ).stdout
          shas = []
          for deployment in json.loads(deployments_json):
              sha = deployment.get("sha")
              if sha and sha != current_sha and sha not in shas:
                  shas.append(sha)

          for sha in shas:
              status = pages_status(sha)
              if status in active_statuses or status == "":
                  print(f"Retry prep: cancelling Pages deployment {sha[:7]} (status={status!r})")
                  cancel_pages_deployment(sha)

          deadline = time.time() + 120
          while time.time() < deadline:
              blocking = [sha for sha in shas if pages_status(sha) in active_statuses]
              if not blocking:
                  break
              for sha in blocking:
                  cancel_pages_deployment(sha)
              time.sleep(5)
          PY

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail deploy job when Pages deploy did not succeed
        if: >-
          steps.deployment.outcome == 'failure' &&
          steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after initial attempt and one retry." >&2
          exit 1
