name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_analyze:
        description: 'Run flutter analyze'
        required: false
        default: 'true'
      run_tests:
        description: 'Run flutter test --coverage'
        required: false
        default: 'true'
      run_integration:
        description: 'Run integration tests (macOS job); off by default — enable to run the macOS integration job'
        required: false
        default: 'false'
      integration_phase:
        description: 'Integration rollout phase: observe | non_blocking | enforced'
        required: false
        type: choice
        default: 'observe'
        options:
          - observe
          - non_blocking
          - enforced
      integration_tier:
        description: 'Integration suite tier: smoke | standard | exhaustive'
        required: false
        type: choice
        default: 'standard'
        options:
          - smoke
          - standard
          - exhaustive

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.44.3'
  COVERAGE_THRESHOLD: '60'
  IOS_SIMULATOR_BOOT_TIMEOUT_SECONDS: '300'
  IOS_SIMULATOR_PREFERRED_NAMES: 'iPhone 17e,iPhone 17 Pro,iPhone 17,iPhone 16e,iPhone 16 Pro,iPhone 16'
  INTEGRATION_TESTS_TIMEOUT_SECONDS: '1800'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_integration: ${{ steps.scope.outputs.run_integration }}
      run_integration_preflight: ${{ steps.scope.outputs.run_integration_preflight }}
      integration_target: ${{ steps.scope.outputs.integration_target }}
      integration_tier: ${{ steps.scope.outputs.integration_tier }}
      integration_phase: ${{ steps.scope.outputs.integration_phase }}
      integration_non_blocking: ${{ steps.scope.outputs.integration_non_blocking }}

    steps:
      - name: Determine integration rollout scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          run_integration="false"
          run_integration_preflight="false"
          integration_phase="enforced"
          integration_tier="smoke"

          case "$event_name" in
            workflow_dispatch)
              run_integration="${{ github.event.inputs.run_integration || 'false' }}"
              run_integration_preflight="$run_integration"
              integration_phase="${{ github.event.inputs.integration_phase || 'observe' }}"
              integration_tier="${{ github.event.inputs.integration_tier || 'standard' }}"
              ;;
            pull_request|merge_group)
              run_integration_preflight="true"
              ;;
          esac

          case "$integration_phase" in
            observe|non_blocking)
              integration_non_blocking=true
              ;;
            enforced)
              integration_non_blocking=false
              ;;
            *)
              echo "Unsupported integration_phase: $integration_phase" >&2
              exit 1
              ;;
          esac

          case "$integration_tier" in
            smoke)
              integration_target="integration_test/smoke_flows_test.dart"
              ;;
            standard)
              integration_target="integration_test/standard_flows_test.dart"
              ;;
            exhaustive)
              integration_target="integration_test/all_flows_test.dart"
              ;;
            *)
              echo "Unsupported integration_tier: $integration_tier" >&2
              exit 1
              ;;
          esac

          {
            echo "run_integration=$run_integration"
            echo "run_integration_preflight=$run_integration_preflight"
            echo "integration_phase=$integration_phase"
            echo "integration_tier=$integration_tier"
            echo "integration_non_blocking=$integration_non_blocking"
            echo "integration_target=$integration_target"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install ripgrep and lcov
        shell: bash
        run: |
          set -euo pipefail
          packages=()
          command -v rg >/dev/null 2>&1 || packages+=(ripgrep)
          command -v lcov >/dev/null 2>&1 || packages+=(lcov)
          if ((${#packages[@]} == 0)); then
            echo "ripgrep and lcov already installed"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y "${packages[@]}"

      - name: Run delivery checklist
        if: >-
          github.event_name != 'workflow_dispatch' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.run_analyze != 'false' &&
           github.event.inputs.run_tests != 'false')
        run: ./bin/checklist

      - name: Flutter analyze
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.run_analyze != 'false' &&
          github.event.inputs.run_tests == 'false'
        run: flutter analyze

      - name: Flutter tests (with coverage)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.run_tests != 'false' &&
          github.event.inputs.run_analyze == 'false'
        run: tool/test_coverage.sh

      - name: Enforce coverage threshold
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.run_tests != 'false'
        run: |
          COVERAGE_FILE=coverage/lcov.info
          TARGET="${{ env.COVERAGE_THRESHOLD }}"
          ACTUAL=$(lcov --summary "$COVERAGE_FILE" | awk '/lines/ {print $2}' | sed 's/%//')
          echo "Coverage: $ACTUAL%"
          awk -v actual="$ACTUAL" -v target="$TARGET" 'BEGIN { exit (actual + 0 >= target + 0 ? 0 : 1) }'

      - name: Upload coverage report
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.run_tests != 'false'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  integration-preflight:
    needs: changes
    runs-on: macos-latest
    timeout-minutes: 20
    continue-on-error: ${{ needs.changes.outputs.integration_non_blocking == 'true' }}
    if: >-
      needs.changes.outputs.run_integration_preflight == 'true'
    outputs:
      preflight_passed: ${{ steps.status.outputs.preflight_passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run integration preflight
        id: run_preflight
        run: ./bin/integration_preflight

      - name: Capture preflight status
        if: always()
        id: status
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.run_preflight.outcome }}" == "success" ]]; then
            echo "preflight_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "preflight_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish integration preflight summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Integration preflight"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- tier: \`${{ needs.changes.outputs.integration_tier }}\`"
            echo "- phase: \`${{ needs.changes.outputs.integration_phase }}\`"
            echo "- preflight_passed: \`${{ steps.status.outputs.preflight_passed }}\`"
            echo "- step_outcome: \`${{ steps.run_preflight.outcome }}\`"
            echo ""
            echo "The slower macOS simulator lane only starts when this preflight job passes during manual integration runs."
          } >> "$GITHUB_STEP_SUMMARY"

  integration:
    needs: [changes, integration-preflight]
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: ${{ needs.changes.outputs.integration_non_blocking == 'true' }}
    if: >-
      github.event_name == 'workflow_dispatch' &&
      needs.changes.outputs.run_integration == 'true' &&
      needs.integration-preflight.outputs.preflight_passed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Firebase iOS/macOS config for CI
        run: |
          set -euo pipefail
          # Real files stay gitignored under Runner/; Xcode still references them for builds.
          cp ios/ci/GoogleService-Info.plist ios/Runner/GoogleService-Info.plist
          cp macos/ci/GoogleService-Info.plist macos/Runner/GoogleService-Info.plist

      - name: Ensure iOS Simulator is booted
        id: simulator
        run: |
          set -euo pipefail
          log() {
            printf '[%s] %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$*"
          }
          skip_integration() {
            log "$1"
            echo "simulator_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          SIMULATOR_SELECTION="$(xcrun simctl list devices available -j | /usr/bin/python3 "$GITHUB_WORKSPACE/tool/ios_simulator_pick.py")" || true
          if [ -z "$SIMULATOR_SELECTION" ]; then
            skip_integration "Skipping integration tests because no reachable iPhone simulator is available on this runner."
          fi
          IFS=$'\t' read -r UDID SIMULATOR_NAME <<< "$SIMULATOR_SELECTION"
          if [ -z "${UDID:-}" ]; then
            skip_integration "Skipping integration tests because simulator selection returned no UDID."
          fi
          log "Selected iPhone simulator: ${SIMULATOR_NAME:-unknown} ($UDID)"
          if ! xcrun simctl boot "$UDID" 2>/dev/null; then
            if ! xcrun simctl list devices booted 2>/dev/null | grep -Fq "$UDID"; then
              skip_integration "Skipping integration tests because the selected simulator could not be booted: $UDID"
            fi
          fi
          log "Waiting for simulator boot: $UDID"
          if ! /usr/bin/python3 - "$UDID" "${IOS_SIMULATOR_BOOT_TIMEOUT_SECONDS}" <<'PY'
          import json
          import subprocess
          import sys
          import time

          udid = sys.argv[1]
          timeout_seconds = int(sys.argv[2])
          deadline = time.time() + timeout_seconds
          attempt = 0

          def log(message: str) -> None:
              timestamp = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
              print(f"[{timestamp}] {message}", flush=True)

          while time.time() < deadline:
              attempt += 1
              result = subprocess.run(
                  ["xcrun", "simctl", "list", "devices", "--json"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              data = json.loads(result.stdout)
              state = None
              for runtime_devices in data.get("devices", {}).values():
                  for device in runtime_devices:
                      if device.get("udid") == udid:
                          state = device.get("state")
                          break
                  if state is not None:
                      break
              if state == "Booted":
                  log(f"Simulator is booted: {udid}")
                  sys.exit(0)
              log(f"Simulator boot pending for {udid}; current state={state or 'unknown'} (attempt {attempt})")
              time.sleep(5)

          log(f"Timed out waiting for simulator to boot: {udid}")
          sys.exit(1)
          PY
          then
            skip_integration "Skipping integration tests because the simulator did not become reachable before timeout: $UDID"
          fi
          echo "CHECKLIST_INTEGRATION_DEVICE=$UDID" >> "$GITHUB_ENV"
          echo "simulator_ready=true" >> "$GITHUB_OUTPUT"

      - name: Verify integration rollout thresholds (enforced phase)
        if: >-
          steps.simulator.outputs.simulator_ready == 'true' &&
          needs.changes.outputs.integration_phase == 'enforced'
        run: bash tool/check_integration_rollout_threshold.sh

      - name: Run integration tests
        if: steps.simulator.outputs.simulator_ready == 'true'
        env:
          INTEGRATION_TESTS_RUN_COVERAGE: '0'
          INTEGRATION_TESTS_RETRY_ON_FAILURE: '0'
          INTEGRATION_TESTS_TIER: ${{ needs.changes.outputs.integration_tier }}
          INTEGRATION_TESTS_TIMEOUT_SECONDS: ${{ env.INTEGRATION_TESTS_TIMEOUT_SECONDS }}
        run: ./bin/integration_tests

      - name: Report skipped integration tests
        if: steps.simulator.outputs.simulator_ready != 'true'
        run: echo 'Integration tests were skipped (no suitable iPhone simulator, boot failed, or boot timed out). See the Ensure iOS Simulator is booted step logs.'

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-artifacts
          path: artifacts/integration/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish integration rollout summary
        if: always()
        run: |
          {
            echo "## Integration rollout wiring"
            echo ""
            echo "- phase: \`${{ needs.changes.outputs.integration_phase }}\`"
            echo "- tier: \`${{ needs.changes.outputs.integration_tier }}\`"
            echo "- non_blocking: \`${{ needs.changes.outputs.integration_non_blocking }}\`"
            echo "- target_hint: \`${{ needs.changes.outputs.integration_target }}\`"
            echo ""
            root="artifacts/integration"
            lf="$root/.last-run-dir"
            echo "### Last integration artifact"
            if [[ -f "$lf" ]]; then
              ad="$(tr -d '\r\n' < "$lf")"
              sum="$ad/summary.json"
              echo "- artifact_dir: \`$ad\`"
              if [[ -f "$sum" ]]; then
                export SUMMARY_JSON="$sum"
                python3 tool/ci_append_integration_summary.py
              else
                echo "- summary: \`(no summary.json at artifact dir — see uploaded integration-artifacts or job logs)\`"
              fi
            else
              echo "- \`(no artifacts/integration/.last-run-dir; job skipped tests, exited before artifact init, or artifact directory not created)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
