name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_analyze:
        description: 'Run flutter analyze'
        required: false
        default: 'true'
      run_tests:
        description: 'Run flutter test --coverage'
        required: false
        default: 'true'
      run_integration:
        description: 'Run integration tests (macOS job)'
        required: false
        default: 'true'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Run delivery checklist
        if: >-
          github.event_name != 'workflow_dispatch' ||
          (github.event.inputs.run_analyze != 'false' &&
           github.event.inputs.run_tests != 'false')
        run: ./bin/checklist

      - name: Flutter analyze
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.run_analyze != 'false' &&
          github.event.inputs.run_tests == 'false'
        run: flutter analyze

      - name: Flutter tests (with coverage)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.run_tests != 'false' &&
          github.event.inputs.run_analyze == 'false'
        run: tool/test_coverage.sh

      - name: Enforce coverage threshold
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.run_tests != 'false'
        run: |
          COVERAGE_FILE=coverage/lcov.info
          TARGET=60
          ACTUAL=$(lcov --summary "$COVERAGE_FILE" | awk '/lines/ {print $2}' | sed 's/%//')
          echo "Coverage: $ACTUAL%"
          awk -v actual="$ACTUAL" -v target="$TARGET" 'BEGIN { exit (actual + 0 >= target + 0 ? 0 : 1) }'

      - name: Upload coverage report
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.run_tests != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  integration:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_integration != 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure iOS Simulator is booted
        run: |
          set -euo pipefail
          UDID="$(xcrun simctl list devices available -j | /usr/bin/python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devs in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable', True) and 'iPhone' in d.get('name', ''):
                      print(d['udid'])
                      raise SystemExit(0)
          print('No available iPhone simulator found', file=sys.stderr)
          raise SystemExit(1)
          ")"
          if ! xcrun simctl boot "$UDID" 2>/dev/null; then
            BOOT_STATUS="$(xcrun simctl list devices "$UDID" | head -n 1 || true)"
            case "$BOOT_STATUS" in
              *"(Booted)"*) ;;
              *)
                echo "Failed to boot simulator: $UDID" >&2
                exit 1
                ;;
            esac
          fi
          xcrun simctl bootstatus "$UDID" -b

      - name: Run integration tests
        run: ./bin/integration_tests
