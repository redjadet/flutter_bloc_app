name: Dependency Updates

on:
  pull_request:
    paths:
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'custom_lints/**/pubspec.yaml'
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

env:
  FLUTTER_VERSION: '3.41.5'
  COVERAGE_THRESHOLD: '60'

concurrency:
  group: dependency-updates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-dependency-updates:
    name: Test Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests (with coverage)
        run: tool/test_coverage.sh

      - name: Enforce coverage threshold
        run: |
          COVERAGE_FILE=coverage/lcov.info
          TARGET="${{ env.COVERAGE_THRESHOLD }}"
          ACTUAL=$(lcov --summary "$COVERAGE_FILE" | awk '/lines/ {print $2}' | sed 's/%//')
          echo "Coverage: $ACTUAL%"
          awk -v actual="$ACTUAL" -v target="$TARGET" 'BEGIN { exit (actual + 0 >= target + 0 ? 0 : 1) }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Comment PR with test results
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} Dependency update tests ${status === 'success' ? 'passed' : 'failed'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
