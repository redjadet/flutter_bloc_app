name: Dependency Updates

on:
  pull_request:
    paths:
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'custom_lints/**/pubspec.yaml'
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.41.9'
  COVERAGE_THRESHOLD: '60'

concurrency:
  group: dependency-updates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-dependency-updates:
    name: Test Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install lcov
        shell: bash
        run: |
          set -euo pipefail
          if command -v lcov >/dev/null 2>&1; then
            echo "lcov already installed"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests (with coverage)
        run: tool/test_coverage.sh

      - name: Enforce coverage threshold
        run: |
          COVERAGE_FILE=coverage/lcov.info
          TARGET="${{ env.COVERAGE_THRESHOLD }}"
          ACTUAL=$(lcov --summary "$COVERAGE_FILE" | awk '/lines/ {print $2}' | sed 's/%//')
          echo "Coverage: $ACTUAL%"
          awk -v actual="$ACTUAL" -v target="$TARGET" 'BEGIN { exit (actual + 0 >= target + 0 ? 0 : 1) }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Publish dependency-update status comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- dependency-updates-status -->';
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = [
              marker,
              `${emoji} Dependency update tests ${status === 'success' ? 'passed' : 'failed'}.`,
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const {data: comments} = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message,
              });
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });
