# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.
#
# Native analyzer plugins (Dart ≥ 3.10): mix_lint + file_length_lint use analysis_server_plugin.
# See https://dart.dev/tools/analyzer-plugins
#
include: package:very_good_analysis/analysis_options.yaml

plugins:
  file_length_lint:
    path: custom_lints/file_length_lint
    diagnostics:
      file_too_long: error
  mix_lint:
    path: custom_lints/mix_lint
    diagnostics:
      mix_avoid_defining_tokens_within_style: true
      mix_avoid_defining_tokens_within_scope: true
      mix_avoid_empty_variants: true
      mix_max_number_of_attributes_per_style: true
      mix_variants_last: true
      mix_mixable_styler_has_create: true
      mix_prefer_dot_shorthands: true
  memory_lint:
    path: custom_lints/memory_lint
    diagnostics:
      memory_state_controller_missing_dispose: error
      memory_stream_controller_missing_close: error
      memory_widgets_binding_observer_missing_remove: error
      memory_static_build_context: error

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    avoid_dynamic_calls: error
    empty_catches: error
    avoid_catches_without_on_clauses: error
    avoid_catching_errors: error
    avoid_print: error
    avoid_slow_async_io: error
    avoid_unnecessary_containers: error
    avoid_void_async: error
    avoid_web_libraries_in_flutter: error
    await_only_futures: error
    cancel_subscriptions: error
    close_sinks: error
    document_ignores: error
    discarded_futures: error
    only_throw_errors: error
    prefer_const_constructors: error
    prefer_const_literals_to_create_immutables: error
    prefer_final_fields: warning
    prefer_final_locals: warning
    unawaited_futures: error
    unnecessary_ignore: error
    unnecessary_statements: error
    use_build_context_synchronously: error
    use_key_in_widget_constructors: error
    # Stricter type inference and null-safety rules
    always_declare_return_types: warning
    prefer_typing_uninitialized_variables: warning
    null_check_on_nullable_type_parameter: error
    unnecessary_nullable_for_final_variable_declarations: warning
    unnecessary_null_in_if_null_operators: warning
    # Stricter Dart analyzer rules. These are errors because AI-generated
    # code commonly hides runtime failures behind dynamic access, broad or
    # empty catches, dropped async work, blocking I/O, and debug output.
    strict_top_level_inference: error
    no_wildcard_variable_uses: error
    implicit_call_tearoffs: warning
    type_literal_in_constant_pattern: error
    avoid_shadowing_type_parameters: error
    collection_methods_unrelated_type: error
    unrelated_type_equality_checks: error
    void_checks: error
  exclude:
    - build/**
    - '**/build/**'
    - .dart_tool/**
    - '**/.pub-cache/**'
    - ios/Pods/**
    - android/.gradle/**
    - android/app/generated/**
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/*.gen.dart'
    - '**/*.gr.dart'
    - '**/*.mocks.dart'
    - '**/*.arb'
    - README.md
    # Ignore vendored packages and tooling pulled in under third_party.
    - third_party/**
    - custom_lints/**
    - tool/**

# Native analyzer plugin configuration (file_length_lint).
file_length_lint:
  # Keep files small to reduce review and AI-agent context payloads.
  max_lines: 225
  # Use plugin defaults (generated files, tests, tools, l10n, etc).
  include_defaults: true
  excludes:
    - integration_test/**

# Keep our custom preferences on top of VGV
linter:
  rules:
    prefer_expression_function_bodies: false
    type_annotate_public_apis: true
    avoid_final_parameters: false
    public_member_api_docs: false
    omit_local_variable_types: false
    lines_longer_than_80_chars: false
    no_default_cases: false
    unnecessary_lambdas: false
    one_member_abstracts: false
    use_decorated_box: true
    unnecessary_breaks: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
