plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}


def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.ilkersevim.blocflutter"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId = "com.ilkersevim.blocflutter"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        def googleMapsAndroidApiKey =
            project.findProperty("GOOGLE_MAPS_ANDROID_API_KEY") ?:
            System.getenv("GOOGLE_MAPS_ANDROID_API_KEY") ?:
            System.getenv("GOOGLE_MAPS_API_KEY")
        manifestPlaceholders["GOOGLE_MAPS_API_KEY"] =
            googleMapsAndroidApiKey ?: "YOUR_ANDROID_GOOGLE_MAPS_API_KEY"
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig = signingConfigs.getByName("release")
            } else {
                throw new GradleException("Release signing requires android/key.properties and a valid keystore.")
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.sqlite:sqlite:2.6.2"
    implementation "net.zetetic:sqlcipher-android:4.14.1"
}

afterEvaluate {
    tasks.named("assembleDebug").configure {
        doLast {
            def sourceApk = layout.buildDirectory.file("outputs/flutter-apk/app-debug.apk").get().asFile
            if (sourceApk.exists()) {
                def destApk = rootProject.projectDir.toPath().resolve("../build/app/outputs/flutter-apk/app-debug.apk").toFile().canonicalFile
                destApk.parentFile.mkdirs()
                java.nio.file.Files.copy(sourceApk.toPath(), destApk.toPath(), java.nio.file.StandardCopyOption.REPLACE_EXISTING)
            }
        }
    }
}
