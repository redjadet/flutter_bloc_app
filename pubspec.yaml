name: flutter_bloc_app_workspace
publish_to: none
description: Pub workspace root for flutter_bloc_app (Melos monorepo).

environment:
  sdk: ">=3.12.0 <4.0.0"

workspace:
  - apps/mobile
  - packages/ai
  - packages/auth
  - packages/core
  - packages/design_system
  - packages/feature_flags
  - packages/networking
  - packages/storage
  - packages/utilities
  - custom_lints/file_length_lint
  - custom_lints/mix_lint

dev_dependencies:
  melos: ^7.0.0

dependency_overrides:
  # json_serializable 6.14 + mix_lint 2.x / file_length_lint (override unifies analyzer graph).
  analyzer: 10.0.2
  dart_style: 3.1.4
  # Resolve email_validator conflict: genui requires ^3.0.0, firebase_ui_auth 3.0.1 requires ^2.1.17
  email_validator: ^3.0.0
  # iOS 26.4 simulator FFI path_provider workaround (see apps/mobile pubspec comments).
  path_provider_foundation: 2.5.1

melos:
  sdkPath: auto
  scripts:
    analyze:
      run: bash tool/analyze_workspace_packages.sh
      description: Analyze workspace library and custom lint packages.
    analyze:flutter:
      run: dart run melos exec --flutter --concurrency=1 --fail-fast -- "flutter analyze lib test"
      description: Analyze Flutter packages (serial; bounded to lib/test).
    format:
      run: dart format --set-exit-if-changed .
      description: Check formatting from workspace root.
    format:write:
      run: dart format .
      description: Format workspace.
    test:
      run: bash tool/test_workspace_dart_packages.sh
      description: Run non-Flutter workspace package tests.
    test:flutter:
      run: dart run melos exec --flutter --dir-exists=test --fail-fast -- "flutter test"
      description: Run Flutter package tests.
    coverage:
      run: dart run melos exec --scope=flutter_bloc_app -- "flutter test --coverage"
      description: Run mobile app coverage gate.
    build_runner:
      run: >
        dart run melos exec --depends-on=build_runner --fail-fast --
        "dart run build_runner build --delete-conflicting-outputs"
      description: Generate code in packages that use build_runner.
    clean:
      run: dart run melos exec --flutter -- "flutter clean"
      description: Clean package build outputs.
    checklist:
      run: ./bin/checklist
      description: Existing full repo delivery gate.
    checklist:fast:
      run: ./bin/checklist-fast
      description: Existing fast docs/tooling gate.
