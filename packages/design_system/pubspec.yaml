name: design_system
publish_to: none
description: Reusable theme extensions and layout widgets (Melos workspace).
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  app_shared_flutter:
    path: ../app_shared_flutter
  core:
    path: ../core
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.0
  responsive_framework: ^1.5.1
  mix: ^2.1.0
  skeletonizer: ^2.1.3
  utilities:
    path: ../utilities

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
