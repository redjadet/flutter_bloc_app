  analyzer: ^13.2.0
  analyzer_plugin: ^0.14.0
  yaml: ^3.1.3

dev_dependencies:
  analyzer_testing: ^0.3.1
  flutter_lints: ^6.0.0
  test: ^1.31.1
  test_reflective_loader: ^0.4.0
